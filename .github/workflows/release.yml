name: Release

# Builds Veil and publishes a GitHub Release with the .dmg + auto-update
# artifacts (latest.json + .sig). The in-app updater reads latest.json from the
# release — GitHub Releases IS the update server, no backend needed.
#
# Required secret for auto-update (free, no Apple account):
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   (from `bun run tauri signer generate`; see DISTRIBUTION.md)
#
# For a Gatekeeper-clean signed/notarized build (needs the Apple Developer
# Program), also add the APPLE_* secrets and uncomment them below.

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release (e.g. v0.1.0)
        required: true
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish (macOS)
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build, sign-for-update & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-update signing (free; not Apple).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # TODO(apple): uncomment for a notarized, Gatekeeper-clean build.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: 'Veil ${{ github.event.inputs.version || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --bundles app,dmg
